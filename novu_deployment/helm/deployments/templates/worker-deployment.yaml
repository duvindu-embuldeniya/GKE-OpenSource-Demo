apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.worker.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.worker.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.worker.name }}
    spec:
      containers:
        - name: {{ .Values.worker.name }}
          image: "{{ .Values.worker.image }}:{{ .Values.worker.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NODE_ENV
              value: {{ .Values.env.nodeEnv | quote }}
            - name: DISABLE_TELEMETRY
              value: {{ .Values.env.disableTelemetry | quote }}
            - name: MONGO_URL
              value: {{ .Values.mongo.url | quote }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: REDIS_PASSWORD
              value: {{ .Values.redis.password | quote }}
            - name: REDIS_CACHE_SERVICE_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_CACHE_SERVICE_PORT
              value: {{ .Values.redis.port | quote }}
            - name: JWT_SECRET
              value: {{ .Values.auth.jwtSecret | quote }}
            - name: STORE_ENCRYPTION_KEY
              value: {{ .Values.auth.encryptionKey | quote }}
            - name: API_ROOT_URL
              value: "http://{{ .Values.api.name }}.{{ .Values.namespace }}.svc.cluster.local:3000"
            - name: BROKER_TYPE
              value: "REDIS"
            - name: LOGGING_LEVEL
              value: {{ .Values.env.loggingLevel | quote }}
            - name: STORAGE_SERVICE
              value: "LOCAL"