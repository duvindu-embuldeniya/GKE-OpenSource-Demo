apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.dashboard.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.dashboard.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.dashboard.name }}
    spec:
      containers:
        - name: {{ .Values.dashboard.name }}
          image: "{{ .Values.dashboard.image }}:{{ .Values.dashboard.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: {{ .Values.env.nodeEnv | quote }}
            - name: VITE_API_HOSTNAME
              value: {{ .Values.urls.apiRoot | quote }}
            - name: VITE_WEBSOCKET_HOSTNAME
              value: {{ .Values.urls.wsUrl | quote }}
            - name: NOVU_SECRET_KEY
              value: {{ .Values.auth.novuSecretKey | quote }}
            - name: SENTRY_DSN
              value: ""